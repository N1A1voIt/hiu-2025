<main class="landing">
  <article class="bg">
    <app-family></app-family>
    <!-- <video src="/assets/video/flower.mp4" autoplay muted loop></video> -->
  </article>
  <article class="content">
    <div class="chat" *ngIf="isChat">
      <div class="you">
        <textarea>Bonjour</textarea>
      </div>
      <div class="me">
        <textarea>Merci beaucoup</textarea>
      </div>
      <div class="you">
        <textarea>Ne t'inquiète pas</textarea>
      </div>
    </div>
    <section class="left">
      <div class="popUp">
        <div class="phaseOne" *ngIf="!isChat">
          <img
            src="/assets/img/placeholder1.jpg"
            alt="placeholder"
            (click)="clickChat()"
          />
        </div>
        <div class="phaseTwo" *ngIf="isChat">
          <img
            src="/assets/img/placeholder1.jpg"
            alt="placeholder"
            (click)="clickChat()"
          />
          <input type="text" name="prompt" placeholder="Ecris moi" />
          <button>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              xmlns:xlink="http://www.w3.org/1999/xlink"
              version="1.1"
              id="Capa_1"
              x="0px"
              y="0px"
              viewBox="0 0 512.308 512.308"
              style="enable-background: new 0 0 512.308 512.308"
              width="25px"
              height="25px"
            >
              <g>
                <path
                  d="M505.878,36.682L110.763,431.69c8.542,4.163,17.911,6.351,27.413,6.4h67.669c5.661-0.015,11.092,2.236,15.083,6.251   l36.672,36.651c19.887,20.024,46.936,31.295,75.157,31.317c11.652-0.011,23.224-1.921,34.261-5.653   c38.05-12.475,65.726-45.46,71.403-85.099l72.085-342.4C513.948,64.89,512.311,49.871,505.878,36.682z"
                />
                <path
                  d="M433.771,1.652L92.203,73.61C33.841,81.628-6.971,135.44,1.047,193.802c3.167,23.048,13.782,44.43,30.228,60.885   l36.651,36.651c4.006,4.005,6.255,9.439,6.251,15.104v67.669c0.049,9.502,2.237,18.872,6.4,27.413L475.627,6.41   C462.645,0.03,447.853-1.651,433.771,1.652z"
                />
              </g>
            </svg>
          </button>
        </div>
      </div>
    </section>
    <section class="right">
      <div class="up">
        <div class="historique">
          <button
            [routerLink]="['/budget']"
            routerLinkActive="router-link-active"
          >
            Fitatanam-bola
          </button>
        </div>
        <div class="historique">
          <app-video-analyzer></app-video-analyzer>
        </div>
        <div class="historique">
          <button>Milalao</button>
        </div>
      </div>

      <div class="down">
        <div class="w-[160px]">
          <app-clipboard></app-clipboard>
        </div>
        <div
          class="safeP"
          *ngIf="isClicked"
          [ngStyle]="{ width: containerWidth + 'px' }"
        >
          <img
            src="/assets/img/room_display.png"
            alt=""
            class="object-cover"
            [ngStyle]="{ width: roomWidth + 'px', height: roomHeight + 'px' }"
          />
          <!--          <app-customizable-room [width]="roomWidth" [height]="roomHeight"></app-customizable-room>-->
          <button class="safePlace" *ngIf="!isGrowing" (click)="growRoom()">
            Trano
          </button>
        </div>


        <div class="safeN border px-2 w-[160px] h-[40px] rounded-2xl " *ngIf="!isClicked">
          <img src="/assets/img/img.png" alt="" />
          <button class="safePlace" (click)="clickSafe()">Safeplace</button>

        <div class="safeN" *ngIf="!isClicked">
          <img src="/assets/img/room_display.png" alt="" />
          <button class="safePlace" (click)="clickSafe()">Trano</button>

        </div>
      </div>
      </div>
    </section>
  </article>
</main>
