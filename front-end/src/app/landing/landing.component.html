<main class="landing">
  <article class="bg">
    <app-family></app-family>
    <!-- <video src="/assets/video/flower.mp4" autoplay muted loop></video> -->
  </article>
  <article class="content">
    <div class="chat" *ngIf="isChat">
      <div class="you">
        <textarea>Bonjour</textarea>
      </div>
      <div class="me">
        <textarea>Merci beaucoup</textarea>
      </div>
      <div class="you">
        <textarea>Ne t'inquiète pas</textarea>
      </div>
    </div>
    <section class="left">
      <div class="popUp">
        <div class="phaseOne" *ngIf="!isChat">
          <img
            src="/assets/img/placeholder1.jpg"
            alt="placeholder"
            (click)="clickChat()"
          />
        </div>
        <div class="phaseTwo" *ngIf="isChat">
          <img
            src="/assets/img/placeholder1.jpg"
            alt="placeholder"
            (click)="clickChat()"
          />
          <input type="text" name="prompt" placeholder="Ecris moi" />
          <button>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              xmlns:xlink="http://www.w3.org/1999/xlink"
              version="1.1"
              id="Capa_1"
              x="0px"
              y="0px"
              viewBox="0 0 512.308 512.308"
              style="enable-background: new 0 0 512.308 512.308"
              width="25px"
              height="25px"
            >
              <g>
                <path
                  d="M505.878,36.682L110.763,431.69c8.542,4.163,17.911,6.351,27.413,6.4h67.669c5.661-0.015,11.092,2.236,15.083,6.251   l36.672,36.651c19.887,20.024,46.936,31.295,75.157,31.317c11.652-0.011,23.224-1.921,34.261-5.653   c38.05-12.475,65.726-45.46,71.403-85.099l72.085-342.4C513.948,64.89,512.311,49.871,505.878,36.682z"
                />
                <path
                  d="M433.771,1.652L92.203,73.61C33.841,81.628-6.971,135.44,1.047,193.802c3.167,23.048,13.782,44.43,30.228,60.885   l36.651,36.651c4.006,4.005,6.255,9.439,6.251,15.104v67.669c0.049,9.502,2.237,18.872,6.4,27.413L475.627,6.41   C462.645,0.03,447.853-1.651,433.771,1.652z"
                />
              </g>
            </svg>
          </button>
        </div>
      </div>
    </section>
    <section class="right">
      <div class="up">
        <div class="historique">
          <button
            [routerLink]="['/budget']"
            routerLinkActive="router-link-active"
          >
            Budget
          </button>
        </div>
        <div class="historique">
          <button (click)="clickModal()">Emotion detection</button>
        </div>
        <div class="historique">
          <button>Play</button>
        </div>
      </div>
      <div class="down">
        <div
          class="safeP"
          *ngIf="isClicked"
          [ngStyle]="{ width: containerWidth + 'px' }"
        >
          <img
            src="/assets/img/room_display.png"
            alt=""
            class="object-cover"
            [ngStyle]="{ width: roomWidth + 'px', height: roomHeight + 'px' }"
          />
          <!--          <app-customizable-room [width]="roomWidth" [height]="roomHeight"></app-customizable-room>-->
          <button class="safePlace" *ngIf="!isGrowing" (click)="growRoom()">
            Safeplace
          </button>
        </div>

        <div class="safeN" *ngIf="!isClicked">
          <img src="/assets/img/room_display.png" alt="" />
          <button class="safePlace" (click)="clickSafe()">Safeplace</button>
        </div>
      </div>
    </section>
  </article>
  <article
    class="modal fixed inset-0 flex items-center justify-center z-50"
    *ngIf="isModal"
  >
    <!-- Overlay arrière-plan flouté -->
    <div class="absolute inset-0 bg-black/30 backdrop-blur-md"></div>

    <!-- Contenu du modal avec effet glassmorphisme -->
    <div
      class="relative w-11/12 max-w-md bg-white/20 backdrop-blur-lg rounded-xl shadow-lg border border-white/30 overflow-hidden"
    >
      <!-- En-tête du modal -->
      <div class="p-6 border-b border-white/20">
        <div class="flex justify-between items-center">
          <h3 class="text-xl font-medium text-white">Emotionnal test</h3>
          <button
            class="text-gray-200 hover:text-white transition-colors"
            (click)="clickModal()"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>
      </div>

      <!-- Corps du modal -->
      <div class="p-6 text-white">
        <p class="mb-4">Avy niantso an'i Bertine ianao teo.</p>
        <p>Narary fo be ilay olona teo.</p>
      </div>

      <!-- Pied du modal avec boutons d'action -->
      <div
        class="p-4 bg-white/10 border-t border-white/20 flex justify-end space-x-3"
      >
        <button
          class="px-4 py-2 bg-terracota hover:bg-blue-700/70 text-white rounded-md backdrop-blur-sm transition-colors"
          (click)="clickModal()"
        >
          Eny ary
        </button>
      </div>
    </div>
  </article>
</main>
